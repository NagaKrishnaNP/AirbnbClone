<svg width="680" height="600" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, Helvetica, sans-serif">
  <title>Production-scale vacation-rental marketplace architecture</title>
  <desc>Layered architecture: CDN and edge network, API gateway, microservices (listings, search, booking, messaging), an event bus, a data layer (Postgres, Redis, OpenSearch, S3), and a cross-cutting CI/CD and observability layer.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="600" fill="#ffffff"/>

  <!-- CDN -->
  <rect x="90" y="40" width="500" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#0C447C">Global CDN + edge network</text>
  <text x="340" y="78" text-anchor="middle" font-size="12" fill="#185FA5">Static assets, listing photos, edge cache</text>

  <line x1="340" y1="96" x2="340" y2="134" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Gateway -->
  <rect x="90" y="136" width="500" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="156" text-anchor="middle" font-size="14" font-weight="bold" fill="#0C447C">API gateway / load balancer</text>
  <text x="340" y="174" text-anchor="middle" font-size="12" fill="#185FA5">Auth, rate limiting, request routing</text>

  <line x1="340" y1="192" x2="340" y2="210" stroke="#5f5e5a" stroke-width="0.5"/>
  <line x1="146.5" y1="210" x2="533.5" y2="210" stroke="#5f5e5a" stroke-width="0.5"/>
  <line x1="146.5" y1="210" x2="146.5" y2="230" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="275.5" y1="210" x2="275.5" y2="230" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="404.5" y1="210" x2="404.5" y2="230" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="533.5" y1="210" x2="533.5" y2="230" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Services tier -->
  <rect x="90"  y="232" width="113" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="219" y="232" width="113" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="348" y="232" width="113" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="477" y="232" width="113" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="146.5" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#3C3489">Listings</text>
  <text x="275.5" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#3C3489">Search</text>
  <text x="404.5" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#3C3489">Booking</text>
  <text x="533.5" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#3C3489">Messaging</text>

  <line x1="146.5" y1="276" x2="146.5" y2="296" stroke="#5f5e5a" stroke-width="0.5"/>
  <line x1="275.5" y1="276" x2="275.5" y2="296" stroke="#5f5e5a" stroke-width="0.5"/>
  <line x1="404.5" y1="276" x2="404.5" y2="296" stroke="#5f5e5a" stroke-width="0.5"/>
  <line x1="533.5" y1="276" x2="533.5" y2="296" stroke="#5f5e5a" stroke-width="0.5"/>
  <line x1="146.5" y1="296" x2="533.5" y2="296" stroke="#5f5e5a" stroke-width="0.5"/>
  <line x1="340" y1="296" x2="340" y2="314" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Event bus -->
  <rect x="90" y="316" width="500" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="336" text-anchor="middle" font-size="14" font-weight="bold" fill="#712B13">Event streaming (Kafka)</text>
  <text x="340" y="354" text-anchor="middle" font-size="12" fill="#993C1D">Async events, CDC, cross-service sync</text>

  <line x1="340" y1="372" x2="340" y2="390" stroke="#5f5e5a" stroke-width="0.5"/>
  <line x1="146.5" y1="390" x2="533.5" y2="390" stroke="#5f5e5a" stroke-width="0.5"/>
  <line x1="146.5" y1="390" x2="146.5" y2="410" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="275.5" y1="390" x2="275.5" y2="410" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="404.5" y1="390" x2="404.5" y2="410" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="533.5" y1="390" x2="533.5" y2="410" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Data tier -->
  <rect x="90"  y="412" width="113" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="219" y="412" width="113" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="348" y="412" width="113" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="477" y="412" width="113" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="146.5" y="438" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Postgres</text>
  <text x="275.5" y="438" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Redis</text>
  <text x="404.5" y="438" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">OpenSearch</text>
  <text x="533.5" y="438" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">S3 storage</text>

  <!-- Cross-cutting CI/CD + observability -->
  <rect x="90" y="496" width="500" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="340" y="516" text-anchor="middle" font-size="14" font-weight="bold" fill="#633806">CI/CD + observability (cross-cutting)</text>
  <text x="340" y="534" text-anchor="middle" font-size="12" fill="#854F0B">CI/CD pipeline, metrics, logs, tracing across every tier above</text>
</svg>
